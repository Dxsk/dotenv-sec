services:
  mitmproxy:
    build: .
    image: dotenv-sec/mitmproxy:latest
    container_name: mitmproxy-${TARGET:-default}
    ports:
      - "${PROXY_PORT:-9999}:8080"
      - "${WEB_PORT:-9998}:8081"
    volumes:
      - "${PROXY_CERTS:-./certs}:/data/certs"
      - "${PROXY_FLOWS:-./flows}:/data/flows"
    restart: unless-stopped
    networks:
      - proxy-net
    environment:
      - WEB_USER=${WEB_USER:-admin}
      - WEB_PASS=${WEB_PASS:-}

networks:
  proxy-net:
    name: dotsec-proxy-net
    external: true
